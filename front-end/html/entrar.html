<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlaê - Entrar</title>
    <link rel="stylesheet" href="/css/entrar-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="entrar-container">
        <div class="logomarca">
            <img src="/img/Logomarca.png" alt="Logo Controlaê">
        </div>

        <form id="login-form">
            <div class="campo-de-texto">
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            
            <div class="campo-de-texto">
                <input type="password" id="password" name="password" placeholder="Senha" required>
            </div>
            
            <button type="submit" class="botao botao-entrar">Entrar</button>
        </form>

        <a href="/pagina-de-cadastro" class="botao botao-cadastrar">Cadastrar</a>
        
        <a href="/recuperar-senha" class="esqueceu-a-senha">Esqueceu a senha?</a>
    </div>
</body>
</html>
